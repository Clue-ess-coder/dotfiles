# ============================================
# ESSENTIAL SETTINGS
# ============================================

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

set -sg escape-time 5 # still messes up 1/25 times, LMAO
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
setw -g aggressive-resize on
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on

# ============================================
# KEY BINDINGS
# ============================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind R source-file ~/.tmux.conf \; display "Config reloaded!"

# bind | split-window
bind r command-prompt "rename-window %%"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | new-window -c "#{pane_current_path}"
bind ^C new-window -c "$HOME"
bind '"' choose-window
bind w list-windows
bind c kill-pane
bind x swap-pane -D # this is actually good, LMAO
bind z resize-pane -Z # Oh, fullscreen? Zen Mode
bind S choose-session

bind ^X lock-server
bind ^D detach
bind ^K send-keys "clear"\; send-keys "Enter"
bind P set pane-border-status

bind * list-clients
bind ^L refresh-client
bind l refresh-client

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# ============================================
# APPEARANCE
# ============================================

set -g status-position top
# set -g status-style 'bg=#13161d fg=#8b949e'

# set -g status-left-length 20
# set -g status-right-length 50

# set -g status-left '#[fg=#00e68a,bold] #S #[fg=#30363d]│ '
# set -g status-right '#[fg=#30363d]│#[fg=#8b949e] %H:%M #[fg=#30363d]│#[fg=#8b949e] %d-%b-%y '
# setw -g window-status-format ' #I:#W '
# setw -g window-status-current-format '#[fg=#00e68a,bold] #I:#W '

# set -g pane-border-style 'fg=#30363d'
# set -g pane-active-border-style 'fg=#00e68a'

set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g message-style 'bg=white fg=#000000 bold'

# ============================================
# PLUGINS (via TPM)
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
